name: Auto Merge and Restart

on:
  workflow_run:
    workflows: ["Bot Check Dev"]
    types:
      - completed

jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fusionar Dev a Main
        run: |
          git checkout main
          git merge origin/dev
          git push origin main

      - name: Sync archivos vía SFTP (Limpieza total)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.PTERO_API_KEY }}
          # IMPORTANTE: Usa la IP numérica de tu servidor (ej: 193.123.45.67) 
          # si el dominio sigue dando TimeOut por Cloudflare.
          server: panel.orionhost.xyz 
          port: 2022
          local_path: './*'
          remote_path: '/'
          # 'delete_remote_files: true' borrará los cogs que ya no existen en el repo
          delete_remote_files: true
          # Lista de archivos a proteger (No se borran del servidor)
          exclude_allow_missing: true
          args: '-o StrictHostKeyChecking=no'
          ignore: |
            .git/
            .github/
            analisis.db
            data.json
            .env
            *.log

      - name: Reiniciar Servidor en Pterodactyl
        run: |
          curl -X POST "https://panel.orionhost.xyz/api/client/servers/${{ secrets.SERVER_ID }}/power" \
          -H "Authorization: Bearer ${{ secrets.PTERO_API_KEY }}" \
          -H "Content-Type: application/json" \
          -H "Accept: Application/vnd.pterodactyl.v1+json" \
          -d '{"signal": "restart"}'