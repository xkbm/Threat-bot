name: Bot Check Dev

on:
  push:
    branches: [ dev ]

jobs:
  test-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Revisar sintaxis (Bot y Cogs)
        run: python -m compileall .

      - name: Test de arranque (Validación de código)
        env:
          # Usamos valores genéricos para que el bot pase las validaciones de las líneas 20-35
          DISCORD_TOKEN: "MTIzNDU2Nzg5MDEyMzQ1Njc4OQ.X.abcde" 
          VT_API_KEY: "test_key"
          SIGHTENGINE_API_USER: "test_user"
          SIGHTENGINE_API_KEY: "test_key"
        run: |
          # Ejecutamos el bot y capturamos la salida
          timeout 15s python bot.py > bot_output.log 2>&1 || code=$?
          
          cat bot_output.log
          
          # Lógica de aprobación:
          # 1. Si sale "LoginFailure" o "Unauthorized", el código es correcto pero el token no. (ÉXITO)
          # 2. Si el código de salida es 124, significa que sobrevivió los 15s. (ÉXITO)
          if grep -q "LoginFailure" bot_output.log || grep -q "Unauthorized" bot_output.log || [ $code -eq 124 ]; then
            echo "✅ El código es estable y la sintaxis es correcta."
            exit 0
          else
            echo "❌ Error real detectado en el código o cogs."
            exit 1
          fi