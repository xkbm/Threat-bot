name: Bot Check Dev

on:
  push:
    branches: [ dev ]  # Solo se activa cuando subes a tu rama de pruebas

jobs:
  test-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Si no hay requirements, esto no detendrá la Action

      - name: Revisar sintaxis (Bot y Cogs)
        # Esto revisa TODO el proyecto en busca de errores de escritura
        run: python -m compileall .

      - name: Test de arranque (10 segundos)
        # Cargamos variables falsas para que el bot pase la validación inicial
        env:
          DISCORD_TOKEN: "MOCK_TOKEN"
          VT_API_KEY: "MOCK_KEY"
          SIGHTENGINE_API_USER: "MOCK_USER"
          SIGHTENGINE_API_KEY: "MOCK_KEY"
        run: |
          # El bot intenta iniciar. Si sobrevive 10s sin crashear, la prueba es un éxito.
          timeout 10s python bot.py || code=$?; 
          if [ $code -eq 124 ]; then 
            echo "El bot y los cogs cargaron correctamente."; 
          else 
            echo "El bot falló al iniciar. Revisa los logs arriba."; 
            exit 1; 
          fi